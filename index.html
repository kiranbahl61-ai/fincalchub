<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Essential Meta Tags -->
    <meta name="description" content="FinCalcHub: India's most trusted personal finance platform. Free financial calculators for loans, SIPs, retirement planning, tax calculations, investment growth, and financial goal planning. Smart planning for every life stage." />
    <meta name="keywords" content="financial calculator, loan calculator, SIP calculator, retirement planner, tax calculator, personal finance, investment calculator, EPF calculator, PPF calculator, financial planning tools, Indian finance" />
    <meta name="author" content="FinCalcHub Team" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Google Site Verification (add your verification code here) -->
    <!-- <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE" /> -->
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:site_name" content="FinCalcHub" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:title" content="FinCalcHub | India-First Personal Finance Platform" />
    <meta property="og:description" content="Access 15+ free financial calculators, personal finance GPS, retirement planning tools, and expert guidance tailored for Indian users. Smart financial decisions made simple." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fincalchub.com" />
    <meta property="og:image" content="https://fincalchub.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FinCalcHub | Personal Finance for Indians" />
    <meta name="twitter:description" content="Free financial calculators, retirement planning, tax guidance, and investment tools for smarter money decisions." />
    <meta name="twitter:image" content="https://fincalchub.com/og-image.jpg" />
    
    <!-- Additional SEO Meta Tags -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Canonical Link -->
    <link rel="canonical" href="https://fincalchub.com" />
    
    <!-- Preconnect to External Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    
    <title>FinCalcHub | India's Personal Finance Platform - Free Financial Calculators & Planning Tools</title>
    
    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FinCalcHub",
      "url": "https://fincalchub.com",
      "description": "India-first personal finance platform offering free financial calculators and planning tools",
      "logo": "https://fincalchub.com/logo.png",
      "sameAs": [
        "https://twitter.com/fincalchub",
        "https://www.linkedin.com/company/fincalchub"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "url": "https://fincalchub.com/contact"
      }
    }
    </script>
    
    <!-- Structured Data - Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FinCalcHub",
      "url": "https://fincalchub.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://fincalchub.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
